<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Double Slit Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Double Slit Simulator</h1>

  <div class="controls">
    <label>
      Wavelength
      <input type="range" id="wavelength" min="380" max="700" value="650">
    </label>

    <label>
      Slit Distance
      <input type="range" id="slitDistance" min="1" max="10" value="4">
    </label>
  </div>

  <canvas id="canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
